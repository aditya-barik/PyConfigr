name: Auto-Label PR and Sync to Issue

on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  auto-label-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Get branch name
        id: branch
        run: |
          echo "name=${GITHUB_HEAD_REF}" >> $GITHUB_OUTPUT
          echo "📌 Branch: ${GITHUB_HEAD_REF}"

      - name: Determine type label from branch
        id: type-label
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          echo "🔍 Analyzing branch: '$BRANCH'"

          if [[ "$BRANCH" == fix/* ]]; then
            echo "label=type:bug" >> $GITHUB_OUTPUT
            echo "✅ Detected type label: type:bug (from fix/* pattern)"
          elif [[ "$BRANCH" == feature/* ]]; then
            echo "label=type:feature" >> $GITHUB_OUTPUT
            echo "✅ Detected type label: type:feature (from feature/* pattern)"
          elif [[ "$BRANCH" == docs/* ]]; then
            echo "label=type:docs" >> $GITHUB_OUTPUT
            echo "✅ Detected type label: type:docs (from docs/* pattern)"
          elif [[ "$BRANCH" == refactor/* ]]; then
            echo "label=type:refactor" >> $GITHUB_OUTPUT
            echo "✅ Detected type label: type:refactor (from refactor/* pattern)"
          elif [[ "$BRANCH" == ci/* ]]; then
            echo "label=type:ci" >> $GITHUB_OUTPUT
            echo "✅ Detected type label: type:ci (from ci/* pattern)"
          elif [[ "$BRANCH" == test/* ]]; then
            echo "label=type:test" >> $GITHUB_OUTPUT
            echo "✅ Detected type label: type:test (from test/* pattern)"
          else
            echo "⚠️  Branch doesn't match known patterns, inferring from PR title..."
            # Default: try to infer from PR title using bracket style [Type]
            if [[ "${{ github.event.pull_request.title }}" == *"[Fix]"* ]]; then
              echo "label=type:bug" >> $GITHUB_OUTPUT
              echo "✅ Detected type label: type:bug (from '[Fix]' in title)"
            elif [[ "${{ github.event.pull_request.title }}" == *"[Feature]"* ]]; then
              echo "label=type:feature" >> $GITHUB_OUTPUT
              echo "✅ Detected type label: type:feature (from '[Feature]' in title)"
            elif [[ "${{ github.event.pull_request.title }}" == *"[Docs]"* ]]; then
              echo "label=type:docs" >> $GITHUB_OUTPUT
              echo "✅ Detected type label: type:docs (from '[Docs]' in title)"
            elif [[ "${{ github.event.pull_request.title }}" == *"[Refactor]"* ]]; then
              echo "label=type:refactor" >> $GITHUB_OUTPUT
              echo "✅ Detected type label: type:refactor (from '[Refactor]' in title)"
            elif [[ "${{ github.event.pull_request.title }}" == *"[CI]"* ]]; then
              echo "label=type:ci" >> $GITHUB_OUTPUT
              echo "✅ Detected type label: type:ci (from '[CI]' in title)"
            elif [[ "${{ github.event.pull_request.title }}" == *"[Test]"* ]]; then
              echo "label=type:test" >> $GITHUB_OUTPUT
              echo "✅ Detected type label: type:test (from '[Test]' in title)"
            else
              echo "label=" >> $GITHUB_OUTPUT
              echo "⚠️  No type label inferred (will only add status:review)"
            fi
          fi

      - name: Apply type label to PR
        id: apply-type-label
        if: steps.type-label.outputs.label != ''
        uses: actions/github-script@v8
        with:
          script: |
            const typeLabel = '${{ steps.type-label.outputs.label }}';
            console.log(`🏷️  Applying type label to PR #${context.issue.number}: ${typeLabel}`);
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [typeLabel]
            });

      - name: Add status:review label
        uses: actions/github-script@v8
        with:
          script: |
            console.log(`🏷️  Applying status label to PR #${context.issue.number}: status:review`);
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['status:review']
            });

      - name: Extract linked issue number and PR milestone
        id: parse-pr-data
        uses: actions/github-script@v8
        with:
          script: |
            console.log('📄 Parsing PR metadata...');
            console.log(`   PR Title: ${context.payload.pull_request.title}`);

            const body = context.payload.pull_request.body || '';
            console.log(`   PR Body Length: ${body.length} characters`);

            // Match: Closes #123, Fixes #456, Resolves #789
            const match = body.match(/(?:Closes|Fixes|Resolves)\s+#(\d+)/i);
            const issueNumber = match ? match[1] : '';
            const issueLinkText = match ? match[0] : '(no issue link found)';

            const milestoneNumber = context.payload.pull_request.milestone?.number || '';
            const milestoneName = context.payload.pull_request.milestone?.title || '(not set)';

            console.log(`   Linked Issue: ${issueNumber ? `#${issueNumber}` : 'None'} ${issueLinkText}`);
            console.log(`   Milestone: #${milestoneNumber || '?'} - ${milestoneName}`);

            core.setOutput('linked-issue', issueNumber);
            core.setOutput('milestone-number', milestoneNumber);
            core.setOutput('has-issue', issueNumber !== '');
            core.setOutput('has-milestone', milestoneNumber !== '');

            if (issueNumber) {
              console.log(`✅ Will sync to issue #${issueNumber}`);
            } else {
              console.log(`⚠️  No linked issue found - skipping sync`);
            }

            if (milestoneNumber) {
              console.log(`✅ Will sync milestone #${milestoneNumber} (${milestoneName})`);
            } else {
              console.log(`⚠️  No milestone set - skipping milestone sync`);
            }

      - name: Build label list to sync
        id: labels-to-sync
        run: |
          echo "📋 Building label list to sync..."
          LABELS='["status:review"'
          echo "   Added: status:review"

          if [[ "${{ steps.type-label.outputs.label }}" != "" ]]; then
            LABELS="$LABELS,\"${{ steps.type-label.outputs.label }}\""
            echo "   Added: ${{ steps.type-label.outputs.label }}"
          fi
          LABELS="$LABELS]"
          echo "labels=$LABELS" >> $GITHUB_OUTPUT
          echo "✅ Final labels to sync: $LABELS"

      - name: Sync labels to linked issue
        if: steps.parse-pr-data.outputs.has-issue == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const labels = ${{ steps.labels-to-sync.outputs.labels }};
            const issueNumber = parseInt('${{ steps.parse-pr-data.outputs.linked-issue }}');

            if (labels.length > 0) {
              console.log(`\n🔗 SYNCING LABELS TO ISSUE #${issueNumber}`);
              console.log(`   Labels to apply (${labels.length}):`);
              labels.forEach((label, idx) => console.log(`     ${idx + 1}. ${label}`));

              github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: labels
              });
              console.log(`✅ Successfully synced ${labels.length} labels to issue #${issueNumber}`);
            } else {
              console.log(`⚠️  No labels to sync to issue #${issueNumber}`);
            }

      - name: Sync milestone to linked issue
        if: steps.parse-pr-data.outputs.has-issue == 'true' && steps.parse-pr-data.outputs.has-milestone == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const issueNumber = parseInt('${{ steps.parse-pr-data.outputs.linked-issue }}');
            const milestoneNumber = parseInt('${{ steps.parse-pr-data.outputs.milestone-number }}');

            console.log(`Syncing milestone #${milestoneNumber} to issue #${issueNumber}`);
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              milestone: milestoneNumber
            });
