name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v5

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.9.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install the Project Dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Check Code Formatting with Ruff
        run: |
          source .venv/bin/activate
          echo "🧹 Checking code formatting with Ruff..."
          ruff check src/ tests/ --statistics --output-file=ci-results/ruff.md

      - name: Upload Ruff Results
        uses: actions/upload-artifact@v4
        with:
          name: Ruff Results
          path: ci-results/ruff.md
          retention-days: 30

  types:
    name: Static Type Checks (MyPy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v5

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.9.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install the Project Dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run MyPy
        run: |
          source .venv/bin/activate
          echo "🛡️ Type checking with MyPy..."
          mypy src/

  test:
    runs-on: ubuntu-latest
    needs: [lint, types]
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    name: Package Test using Python ${{ matrix.python-version }}

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v5

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.9.2

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the Project Dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          source .venv/bin/activate
          echo "🧪 Running tests with PyTest..."
          pytest -m "not integration" \
            --cov-report=xml:.pytest/results/coverage-${{ matrix.python-version }}.xml \
            --cov-report=markdown:.pytest/results/coverage-${{ matrix.python-version }}.md \
            -v
        continue-on-error: false

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: aditya-barik/PyConfigr
          files: .pytest/results/coverage-${{ matrix.python-version }}.xml


  build:
    name: Build Python Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v5

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.9.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Build the package
        run: |
          echo "📦 Building the package..."
          uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ./dist/*.whl
          retention-days: 30

  integration:
    name: Package Integration Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v5

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          version: 0.9.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/build/

      - name: Install the package
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install artifacts/build/$(ls artifacts/build/ | grep .whl)
          uv pip install pytest pytest-cov

      - name: Run PyConfigr Integration Test
        run: |
          source .venv/bin/activate
          echo "🧪 Running PyConfigr Integration Test..."
          pytest -m integration -v
        continue-on-error: false
