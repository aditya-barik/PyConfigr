name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  UV_VERSION: "0.9.2"
  INTEGRATION_PYTHON_VERSION: "3.10"

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v5

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install the Project Dependencies
        run: uv sync --extra dev

      - name: Check Code Formatting with Ruff
        run: |
          echo "🧹 Checking code formatting with Ruff..."
          uv run ruff check src/ tests/ --statistics --output-file=ci-results/ruff.md

      - name: Upload Ruff Results
        uses: actions/upload-artifact@v4
        with:
          name: Ruff Results
          path: ci-results/ruff.md
          retention-days: 30

  types:
    name: Static Type Checks (MyPy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v5

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install the Project Dependencies
        run: uv sync --extra dev

      - name: Run MyPy
        run: |
          echo "🛡️ Type checking with MyPy..."
          uv run mypy src/

  test:
    runs-on: ubuntu-latest
    needs: [lint, types]
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"

    name: Package Test using Python ${{ matrix.python-version }}

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v5

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the Project Dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: |
          echo "🧪 Running tests with PyTest..."
          uv run pytest -m "not integration" \
            --cov-report=xml:.pytest/results/coverage-${{ matrix.python-version }}.xml \
            --cov-report=markdown:.pytest/results/coverage-${{ matrix.python-version }}.md \
            -v
        continue-on-error: false

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: aditya-barik/PyConfigr
          files: .pytest/results/coverage-${{ matrix.python-version }}.xml

  build:
    name: Build Python Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v5

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Build the package
        run: |
          echo "📦 Building the package..."
          uv build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: ./dist/*.whl
          retention-days: 30

  integration:
    name: Package Integration Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v5

      - name: Setup UV
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.INTEGRATION_PYTHON_VERSION }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: artifacts/build/

      - name: Install the package
        run: |
          uv venv
          uv pip install artifacts/build/$(ls artifacts/build/ | grep .whl)
          uv pip install pytest pytest-cov

      - name: Run PyConfigr Integration Test
        run: |
          echo "🧪 Running PyConfigr Integration Test..."
          uv run pytest -m integration -v
        continue-on-error: false
